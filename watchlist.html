<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Lists – AniStream</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header id="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">AniStream</a>
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search anime..." autocomplete="off" />
        <div id="search-results" class="search-dropdown hidden"></div>
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
      </nav>
    </div>
  </header>

  <main style="padding:20px 16px;">

    <section class="section">
      <h2 class="section-title">⭐ Favorites</h2>
      <div id="favorites-grid" class="anime-grid">
        <p class="empty-msg">No favorites yet.</p>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">📋 Watchlist</h2>
      <div id="watchlist-grid" class="anime-grid">
        <p class="empty-msg">Your watchlist is empty.</p>
      </div>
    </section>

  </main>

  <footer>
    <p>AniStream &mdash; Data from AniList &amp; Consumet. For educational use only.</p>
  </footer>

  <script src="api.js"></script>
  <script>
    // Render watchlist and favorites from localStorage
    function renderSavedList(key, gridId) {
      const grid = document.getElementById(gridId);
      const items = JSON.parse(localStorage.getItem(key) || '[]');
      if (!items.length) return;
      grid.innerHTML = '';
      items.forEach(anime => {
        const card = document.createElement('a');
        card.href = `anime.html?id=${anime.id}`;
        card.className = 'anime-card';
        card.innerHTML = `
          <img src="${anime.image}" alt="${anime.title}" loading="lazy" />
          <div class="card-info">
            <div class="card-title">${anime.title}</div>
          </div>`;
        grid.appendChild(card);
      });
    }

    renderSavedList('anistream_favorites', 'favorites-grid');
    renderSavedList('anistream_watchlist', 'watchlist-grid');

    // Wire up search (reuse api.js search)
    document.getElementById('search-input').addEventListener('input', async function() {
      const q = this.value.trim();
      const box = document.getElementById('search-results');
      if (q.length < 2) { box.classList.add('hidden'); return; }
      const results = await searchAnime(q);
      renderSearchResults(results, box);
    });
  </script>
</body>
</html>
